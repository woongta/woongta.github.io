    <!-- Auth0 SDK -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/1.22/auth0-spa-js.production.js"></script>

    <script>
        // Auth0 설정
        let auth0Client = null;

        // Auth0 초기화
        async function initAuth0() {
            try {
                console.log('Auth0 초기화 중...');
                auth0Client = await auth0.createAuth0Client({
                    domain: 'woongta.us.auth0.com',
                    client_id: 'PxqP6OFoeLXgr8ibqSEXoJpcU7iDqJ65',
                    redirect_uri: window.location.origin
                });

                console.log('Auth0 클라이언트 생성 완료');

                // URL에 code 파라미터가 있으면 로그인 처리
                if (window.location.search.includes('code=') && window.location.search.includes('state=')) {
                    console.log('콜백 처리 중...');
                    await auth0Client.handleRedirectCallback();
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

                // 사용자 정보 확인
                await updateUI();
            } catch (error) {
                console.error('Auth0 초기화 오류:', error);
            }
        }

        // UI 업데이트
        async function updateUI() {
            try {
                const isAuthenticated = await auth0Client.isAuthenticated();
                const loginBtn = document.getElementById('loginBtn');
                const userProfile = document.getElementById('userProfile');

                console.log('인증 상태:', isAuthenticated);

                if (isAuthenticated) {
                    const user = await auth0Client.getUser();
                    console.log('사용자 정보:', user);

                    loginBtn.style.display = 'none';
                    userProfile.style.display = 'flex';

                    document.getElementById('userName').textContent = user.name || user.email;
                    document.getElementById('userImage').src = user.picture || 'https://via.placeholder.com/32';
                } else {
                    loginBtn.style.display = 'block';
                    userProfile.style.display = 'none';
                }
            } catch (error) {
                console.error('UI 업데이트 오류:', error);
            }
        }

        // 로그인
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                console.log('로그인 버튼 클릭');
                await auth0Client.loginWithPopup();
                await updateUI();
            } catch (error) {
                console.error('로그인 오류:', error);
            }
        });

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', () => {
            console.log('로그아웃');
            auth0Client.logout({
                returnTo: window.location.origin
            });
        });

        // 모달 열기
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }

        // 모달 닫기
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 모달 바깥쪽 클릭 시 닫기
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        // 부드러운 스크롤
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // 페이지 로드 완료 후 Auth0 초기화
        window.addEventListener('load', initAuth0);
    </script>
</body>
</html>
